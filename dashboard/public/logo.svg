<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4D6D"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="cloud3dTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E8E8F0"/>
    </linearGradient>
    <linearGradient id="cloud3dSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D0D0E0"/>
      <stop offset="100%" style="stop-color:#B0B0C8"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4D6D"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="dropShadow3d" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000040"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <style>
      .rotate-3d {
        animation: rotate3d 8s ease-in-out infinite;
        transform-origin: 100px 100px;
      }
      .float {
        animation: float 3s ease-in-out infinite;
        transform-origin: 100px 100px;
      }
      .pulse-glow {
        animation: pulseGlow 2s ease-in-out infinite;
      }
      .sparkle {
        animation: sparkle 2s ease-in-out infinite;
      }
      .sparkle-delay-1 {
        animation: sparkle 2s ease-in-out infinite;
        animation-delay: 0.5s;
      }
      .sparkle-delay-2 {
        animation: sparkle 2s ease-in-out infinite;
        animation-delay: 1s;
      }
      .orbit {
        animation: orbit 6s linear infinite;
        transform-origin: 100px 100px;
      }
      .orbit-reverse {
        animation: orbit 8s linear infinite reverse;
        transform-origin: 100px 100px;
      }
      @keyframes rotate3d {
        0%, 100% { transform: perspective(400px) rotateY(-5deg) rotateX(5deg); }
        25% { transform: perspective(400px) rotateY(5deg) rotateX(-3deg); }
        50% { transform: perspective(400px) rotateY(3deg) rotateX(-5deg); }
        75% { transform: perspective(400px) rotateY(-3deg) rotateX(3deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.05); }
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes orbit {
        from { transform: rotate(0deg) translateX(45px) rotate(0deg); }
        to { transform: rotate(360deg) translateX(45px) rotate(-360deg); }
      }
    </style>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="70" fill="url(#glowGrad)" class="pulse-glow"/>

  <!-- Main icon container with 3D rotation -->
  <g class="rotate-3d">
    <!-- Rounded square background with 3D shadow -->
    <rect x="20" y="20" width="160" height="160" rx="36" ry="36" fill="url(#bgGrad3d)" filter="url(#dropShadow3d)"/>

    <!-- 3D cloud body - top surface -->
    <g class="float">
      <!-- Cloud base shadow layer -->
      <ellipse cx="100" cy="108" rx="45" ry="22" fill="url(#cloud3dSide)" opacity="0.5"/>

      <!-- Cloud main body -->
      <ellipse cx="100" cy="96" rx="40" ry="24" fill="url(#cloud3dTop)"/>
      <ellipse cx="75" cy="88" rx="22" ry="18" fill="url(#cloud3dTop)"/>
      <ellipse cx="125" cy="88" rx="22" ry="18" fill="url(#cloud3dTop)"/>
      <ellipse cx="100" cy="82" rx="28" ry="20" fill="url(#cloud3dTop)"/>

      <!-- Cloud highlight -->
      <ellipse cx="95" cy="85" rx="15" ry="8" fill="white" opacity="0.4"/>

      <!-- Play button in center -->
      <polygon points="92,90 112,98 92,106" fill="url(#playGrad)" filter="url(#softGlow)"/>
    </g>

    <!-- Orbiting accent dots -->
    <circle cx="100" cy="55" r="4" fill="#FFD93D" class="orbit" opacity="0.8"/>
    <circle cx="100" cy="55" r="3" fill="#10B981" class="orbit-reverse" opacity="0.6"/>
  </g>

  <!-- Sparkles -->
  <g class="sparkle" transform="translate(35, 40)">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="sparkle-delay-1" transform="translate(160, 50)">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g class="sparkle-delay-2" transform="translate(45, 155)">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
