<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6969"/>
      <stop offset="50%" style="stop-color:#C80036"/>
      <stop offset="100%" style="stop-color:#0C1844"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FFF5E1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6969;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF6969;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0C184440"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      .float {
        animation: float 3s ease-in-out infinite;
      }
      .pulse {
        animation: pulse 2s ease-in-out infinite;
      }
      .sparkle {
        animation: sparkle 2s ease-in-out infinite;
      }
      .sparkle-d1 { animation: sparkle 2s ease-in-out infinite; animation-delay: 0.5s; }
      .sparkle-d2 { animation: sparkle 2s ease-in-out infinite; animation-delay: 1s; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.25; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.1); }
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="75" fill="url(#glowGrad)" class="pulse"/>

  <!-- Rounded square background -->
  <rect x="22" y="22" width="156" height="156" rx="36" ry="36" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Play icon -->
  <g class="float">
    <!-- Play triangle -->
    <polygon points="82,68 82,132 132,100" fill="url(#playGrad)" filter="url(#glow)"/>
  </g>

  <!-- Sparkles -->
  <g class="sparkle" transform="translate(38, 45)">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#FFF5E1" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#FFF5E1" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="sparkle-d1" transform="translate(158, 52)">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#FFF5E1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#FFF5E1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g class="sparkle-d2" transform="translate(48, 148)">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#FFF5E1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#FFF5E1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
