<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#FFD93D"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="112" height="112" rx="24" ry="24" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Cloud shape -->
  <g transform="translate(60, 52)">
    <!-- Main cloud body -->
    <ellipse cx="0" cy="8" rx="28" ry="16" fill="url(#cloudGrad)"/>
    <ellipse cx="-14" cy="2" rx="14" ry="12" fill="url(#cloudGrad)"/>
    <ellipse cx="14" cy="2" rx="14" ry="12" fill="url(#cloudGrad)"/>
    <ellipse cx="0" cy="-2" rx="18" ry="14" fill="url(#cloudGrad)"/>

    <!-- Play button inside cloud -->
    <polygon points="-6,-8 12,0 -6,8" fill="#FF6B6B" transform="translate(2, 4)"/>
  </g>

  <!-- Stars -->
  <g fill="#FFD93D">
    <circle cx="24" cy="22" r="3" opacity="0.9"/>
    <circle cx="96" cy="28" r="2.5" opacity="0.7"/>
    <circle cx="20" cy="92" r="2" opacity="0.6"/>
    <circle cx="98" cy="88" r="3" opacity="0.8"/>
  </g>

  <!-- Small sparkle accents -->
  <g stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="32" y1="80" x2="32" y2="86"/>
    <line x1="29" y1="83" x2="35" y2="83"/>
    <line x1="88" y1="70" x2="88" y2="76"/>
    <line x1="85" y1="73" x2="91" y2="73"/>
  </g>
</svg>
