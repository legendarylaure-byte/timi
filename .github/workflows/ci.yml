name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check dashboard health
        run: |
          curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://timi.vyomai.cloud/api/health" | grep 200
