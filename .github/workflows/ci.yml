name: CI/CD Pipeline  # v2 — Vercel secrets added

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  dashboard-lint:
    name: Dashboard Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './dashboard/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyB_YVhUOJ9vqGxECfoblbSQ-C3J8OjnCxw
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: timi-childern-stories.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: timi-childern-stories
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: timi-childern-stories.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 839918420419
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:839918420419:web:977870986209404eebbd76

  agents-lint:
    name: Agents Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: uv pip install --system -r requirements.txt
      - run: pip install flake8 pyright
      - run: flake8 crew/ utils/ main.py tests/ --max-line-length=120
      - run: pyright .
      - run: python -m pytest tests/ -v

  bot-lint:
    name: Bot Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install flake8 pyright
      - run: flake8 . --max-line-length=120

  deploy:
    name: Deploy to Vercel
    needs: [dashboard-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./dashboard
          vercel-args: '--prod'
