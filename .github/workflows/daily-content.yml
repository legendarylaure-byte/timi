name: Daily Content Generation

on:
  schedule:
    - cron: '0 6 * * *'  # Run daily at 6:00 AM UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom topic for video generation'
        required: false
        default: ''
      format:
        description: 'Video format'
        required: true
        default: 'shorts'
        type: choice
        options:
          - shorts
          - long
      category:
        description: 'Content category'
        required: false
        default: 'Self-Learning'
      enable_multi_lang:
        description: 'Generate multi-language versions'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_subtitles:
        description: 'Burn subtitles into video'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  generate-content:
    name: Generate Video Content
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install FFmpeg with subtitle support
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-extra

      - name: Install dependencies
        working-directory: ./agents
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: Configure environment
        working-directory: ./agents
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Create .env file from secrets
          cat > .env << EOF
          GROQ_API_KEY=$GROQ_API_KEY
          GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
          GEMINI_API_KEY=$GEMINI_API_KEY
          FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID
          YOUTUBE_CLIENT_ID=$YOUTUBE_CLIENT_ID
          YOUTUBE_CLIENT_SECRET=$YOUTUBE_CLIENT_SECRET
          PEXELS_API_KEY=$PEXELS_API_KEY
          PIXABAY_API_KEY=$PIXABAY_API_KEY
          ENABLE_MULTI_LANG=${{ github.event.inputs.enable_multi_lang || 'true' }}
          ENABLE_SUBTITLES=${{ github.event.inputs.enable_subtitles || 'true' }}
          ENABLE_REVIEW_GATE=true
          AUTO_APPROVE_THRESHOLD=80
          SCHEDULE_SHORTS_PER_DAY=2
          SCHEDULE_LONG_PER_DAY=1
          PATH=/usr/bin:/bin
          EOF

          # Decode Firebase service account (use printf to avoid shell expansion issues)
          mkdir -p firebase
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > firebase/serviceAccountKey.json

          # Decode YouTube OAuth token if available
          if [ -n "$YOUTUBE_OAUTH_TOKEN" ]; then
            echo "$YOUTUBE_OAUTH_TOKEN" > youtube_token.json
          fi

      - name: Run daily content pipeline
        working-directory: ./agents
        run: |
          source .venv/bin/activate
          python3 -c "
          import os
          os.environ['PATH'] = '/usr/bin:/bin:' + os.environ.get('PATH', '')

          from main import (
            daily_content_job,
            generate_short_video,
            generate_long_video,
            log_event
          )

          topic = '${{ github.event.inputs.topic }}'
          format_type = '${{ github.event.inputs.format || 'shorts' }}'
          category = '${{ github.event.inputs.category || 'Self-Learning' }}'

          if topic:
            log_event('MANUAL', f'Generating custom video: {topic} ({format_type})')
            if format_type == 'shorts':
              success = generate_short_video(topic, category, f'manual-{format_type}')
            else:
              success = generate_long_video(topic, category, f'manual-{format_type}')
            log_event('MANUAL', f'Result: {\"SUCCESS\" if success else \"FAILED\"}')
            if not success:
              exit(1)
          else:
            log_event('SCHEDULED', 'Running daily content generation')
            daily_content_job()
          "

      - name: Upload generated videos as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: agents/output/*.mp4
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Content Generation Failed',
              body: `Daily content generation failed on ${new Date().toISOString()}. Check the workflow logs for details.`,
              labels: ['bug', 'automation']
            })
