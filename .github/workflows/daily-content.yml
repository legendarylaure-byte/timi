name: Daily Content Generation

on:
  schedule:
    - cron: '30 6 * * *'  # Morning: 6:30 AM UTC
    - cron: '0 14 * * *'  # Afternoon: 2:00 PM UTC
    - cron: '30 20 * * *' # Evening: 8:30 PM UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom topic for video generation'
        required: false
        default: ''
      format:
        description: 'Video format'
        required: true
        default: 'shorts'
        type: choice
        options:
          - shorts
          - long
      category:
        description: 'Content category'
        required: false
        default: 'AI Explained'
      enable_multi_lang:
        description: 'Generate multi-language versions'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_subtitles:
        description: 'Burn subtitles into video'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: daily-content-${{ github.ref_name }}${{ github.event.schedule }}
  cancel-in-progress: false

jobs:
  generate-content:
    name: Generate Video Content
    runs-on: [self-hosted, mac, m5]
    timeout-minutes: 120
    permissions:
      contents: read
      issues: write
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      LTX_ENGINE: mlx
      LTX_LOW_RAM: true
      ENABLE_DIRECTOR_REVIEW: true
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('./agents/requirements.txt') }}

      - name: Install FFmpeg
        run: |
          if [[ "$(uname)" == "Darwin" ]]; then
            brew list ffmpeg 2>/dev/null && echo "ffmpeg already installed" || brew install ffmpeg
          else
            sudo apt-get update
            sudo apt-get install -y ffmpeg libavcodec-extra
          fi

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: ./agents
        run: |
          uv venv --python 3.13
          source .venv/bin/activate
          uv pip install -r requirements.txt
          if [ -f ltx-requirements.txt ]; then
            uv pip install -r ltx-requirements.txt
          fi
          if [ -d /tmp/ltx-2-mlx ]; then
            echo "Installing LTX backend from /tmp/ltx-2-mlx"
            uv pip install /tmp/ltx-2-mlx
          else
            echo "Cloning and installing LTX backend from GitHub"
            git clone https://github.com/dgrauet/ltx-2-mlx.git /tmp/ltx-2-mlx
            sed -i '' '/^classifiers/,/^]/d' /tmp/ltx-2-mlx/pyproject.toml
            uv pip install /tmp/ltx-2-mlx
          fi

      - name: Configure environment
        working-directory: ./agents
        run: |
          # Decode Firebase service account (raw JSON secret)
          mkdir -p firebase
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > firebase/serviceAccountKey.json

          # Decode YouTube OAuth token — try base64 first, fall back to raw JSON
          printf '%s' "$YOUTUBE_OAUTH_TOKEN" | base64 -d > youtube_token.json 2>/dev/null || true
          if [ ! -s youtube_token.json ]; then
            printf '%s' "$YOUTUBE_OAUTH_TOKEN" > youtube_token.json
          fi
          if [ ! -s youtube_token.json ]; then
            echo "ERROR: YOUTUBE_OAUTH_TOKEN produced an empty file"
            exit 1
          fi
          echo "  ✅ YouTube OAuth token decoded ($(wc -c < youtube_token.json) bytes)"

          echo "=== Pre-flight checks ==="
          for var in FIREBASE_PROJECT_ID FIREBASE_SERVICE_ACCOUNT YOUTUBE_CLIENT_ID YOUTUBE_CLIENT_SECRET YOUTUBE_OAUTH_TOKEN PEXELS_API_KEY PIXABAY_API_KEY GEMINI_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Required secret $var is not set"
              exit 1
            fi
            echo "  ✅ $var is set"
          done
          ffmpeg -version > /dev/null 2>&1 || { echo "ERROR: ffmpeg not found"; exit 1; }
          echo "  ✅ ffmpeg available"
          ffprobe -version > /dev/null 2>&1 || { echo "ERROR: ffprobe not found"; exit 1; }
          echo "  ✅ ffprobe available"
          AVAIL_KB=$(df . | awk 'NR==2 {print $4}')
          if [ "$AVAIL_KB" -lt 1048576 ]; then
            echo "ERROR: Less than 1GB disk space available (${AVAIL_KB}KB)"
            exit 1
          fi
          echo "  ✅ Disk space: $((AVAIL_KB / 1024))MB available"
          echo "=== All pre-flight checks passed ==="

      - name: Determine content slot
        id: slot
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "06" ] || [ "$HOUR" = "07" ]; then
            echo "SLOT=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "14" ] || [ "$HOUR" = "15" ]; then
            echo "SLOT=afternoon" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "20" ] || [ "$HOUR" = "21" ]; then
            echo "SLOT=evening" >> $GITHUB_OUTPUT
          else
            echo "SLOT=unscheduled" >> $GITHUB_OUTPUT
          fi
          echo "Content slot: ${{ steps.slot.outputs.SLOT }}"

      - name: Run daily content pipeline
        working-directory: ./agents
        env:
          TOPIC: ${{ github.event.inputs.topic }}
          FORMAT: ${{ github.event.inputs.format || 'shorts' }}
          CATEGORY: ${{ github.event.inputs.category || 'AI Explained' }}
          SLOT: ${{ steps.slot.outputs.SLOT }}
        run: |
          source .venv/bin/activate
          python3 run_pipeline.py

      - name: Upload generated videos as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: generated-videos
          path: agents/output/*.mp4
          retention-days: 7
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Content Generation Failed',
              body: `Daily content generation failed on ${new Date().toISOString()}. Check the workflow logs for details.`,
              labels: ['bug', 'automation']
            })
