name: Daily Content Generation

on:
  schedule:
    - cron: '30 6 * * *'  # Run daily at 6:30 AM UTC (jittered)
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom topic for video generation'
        required: false
        default: ''
      format:
        description: 'Video format'
        required: true
        default: 'shorts'
        type: choice
        options:
          - shorts
          - long
      category:
        description: 'Content category'
        required: false
        default: 'Self-Learning'
      enable_multi_lang:
        description: 'Generate multi-language versions'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_subtitles:
        description: 'Burn subtitles into video'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  generate-content:
    name: Generate Video Content
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('./agents/requirements.txt') }}

      - name: Install extra codecs for FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y libavcodec-extra

      - name: Install dependencies
        working-directory: ./agents
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: Configure environment
        working-directory: ./agents
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Decode Firebase service account (raw JSON secret)
          mkdir -p firebase
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > firebase/serviceAccountKey.json

          # Decode YouTube OAuth token — try base64 first, fall back to raw JSON
          printf '%s' "$YOUTUBE_OAUTH_TOKEN" | base64 -d > youtube_token.json 2>/dev/null || true
          if [ ! -s youtube_token.json ]; then
            printf '%s' "$YOUTUBE_OAUTH_TOKEN" > youtube_token.json
          fi
          if [ ! -s youtube_token.json ]; then
            echo "ERROR: YOUTUBE_OAUTH_TOKEN produced an empty file"
            exit 1
          fi
          echo "  ✅ YouTube OAuth token decoded ($(wc -c < youtube_token.json) bytes)"

          echo "=== Pre-flight checks ==="
          for var in GROQ_API_KEY FIREBASE_PROJECT_ID FIREBASE_SERVICE_ACCOUNT YOUTUBE_CLIENT_ID YOUTUBE_CLIENT_SECRET YOUTUBE_OAUTH_TOKEN PEXELS_API_KEY PIXABAY_API_KEY GEMINI_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "ERROR: Required secret $var is not set"
              exit 1
            fi
            echo "  ✅ $var is set"
          done
          ffmpeg -version > /dev/null 2>&1 || { echo "ERROR: ffmpeg not found"; exit 1; }
          echo "  ✅ ffmpeg available"
          ffprobe -version > /dev/null 2>&1 || { echo "ERROR: ffprobe not found"; exit 1; }
          echo "  ✅ ffprobe available"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama-3.3-70b-versatile","messages":[{"role":"user","content":"ping"}],"max_tokens":1}' 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "  ✅ Groq API healthy"
          else
            echo "  ⚠️  Groq API health check returned $STATUS (non-blocking)"
          fi
          AVAIL_KB=$(df . | awk 'NR==2 {print $4}')
          if [ "$AVAIL_KB" -lt 1048576 ]; then
            echo "ERROR: Less than 1GB disk space available (${AVAIL_KB}KB)"
            exit 1
          fi
          echo "  ✅ Disk space: $((AVAIL_KB / 1024))MB available"
          echo "=== All pre-flight checks passed ==="

      - name: Run daily content pipeline
        working-directory: ./agents
        env:
          TOPIC: ${{ github.event.inputs.topic }}
          FORMAT: ${{ github.event.inputs.format || 'shorts' }}
          CATEGORY: ${{ github.event.inputs.category || 'Self-Learning' }}
        run: |
          source .venv/bin/activate
          python3 run_pipeline.py

      - name: Upload generated videos as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: agents/output/*.mp4
          retention-days: 7
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Content Generation Failed',
              body: `Daily content generation failed on ${new Date().toISOString()}. Check the workflow logs for details.`,
              labels: ['bug', 'automation']
            })
