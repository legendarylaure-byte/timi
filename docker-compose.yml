services:
  pipeline:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: timi-pipeline
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3.5:9b
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase/serviceAccountKey.json
    env_file:
      - ./agents/.env
    volumes:
      - ./firebase/serviceAccountKey.json:/app/firebase/serviceAccountKey.json:ro
      - ./agents/youtube_token.json:/app/youtube_token.json
      - ./agents/output:/app/output
      - ./agents/data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os; exit(0 if 'main.py' in open('/proc/1/cmdline').read() else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
